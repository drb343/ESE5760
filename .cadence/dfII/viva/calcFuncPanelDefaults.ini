[delay]
Edge%20Number%201=7
Edge%20Number%202=3
Edge%20Type%201=falling
Edge%20Type%202=rising
Number%20of%20occurrences=single
Periodicity%201=1
Periodicity%202=1
Plot\print%20vs.=trigger
Signal1="delay(?wf1 v(\"/CLK\" ?result \"tran\"), ?value1 0.6, ?edge1 \"falling\", ?nth1 7, ?td1 0.0, ?tol1 nil, ?wf2 v(\"/OUT0\" ?result \"tran\"), ?value2 0.6, ?edge2 \"rising\", ?nth2 3, ?tol2 nil,  ?td2 nil , ?stop nil,  ?period1 1 ?period2 1 ?multiple t ?xName \"target\" )"
Signal2="delay(?wf1 v(\"/CLK\" ?result \"tran\"), ?value1 0.6, ?edge1 \"falling\", ?nth1 7, ?td1 0.0, ?tol1 nil, ?wf2 v(\"/OUT0\" ?result \"tran\"), ?value2 0.6, ?edge2 \"rising\", ?nth2 3, ?tol2 nil,  ?td2 nil , ?stop nil,  ?period1 1 ?period2 1 ?multiple t ?xName \"trigger\" )"
Start%201=0.0
Start%202=nil
Start%202%20relative%20to=trigger
Stop=nil
Threshold%20Value%201=0.6
Threshold%20Value%202=0.6
Tolerance%201=nil
Tolerance%202=nil

[delayMeasure]
Edge%20Number%201=1
Edge%20Number%202=1
Edge%20Type%201=either
Edge%20Type%202=either
Signal1=
Signal2=v(\"/Output\" ?result \"tran\")
Threshold%20Value%201=nil
Threshold%20Value%202=nil

[freq]
Edge%20Type=rising
Plot%20vs.=cycle
Signal=freq(leafValue( getData(\"/S3\" ?result \"tran\") \"period\" 6.5e-09 ) \"rising\" ?xName \"cycle\" ?mode \"auto\" ?threshold 0.0)
Threshold%20Mode=auto
User%20Threshold%20Value=0.0

[freq_jitter]
