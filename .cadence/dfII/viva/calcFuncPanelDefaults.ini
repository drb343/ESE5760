mode=auto

[integ]
Extrapolate=on
Final%20Value=32n
Initial%20Value=0
Signal=integ(i(\"/I0/VDD\" ?result \"tran\") 0 32n \" \" )

[vh]
Analysis%20Type=hb
Harmonic%20List=nil
Net%20name=

[waveVsWave]
